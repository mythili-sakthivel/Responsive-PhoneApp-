<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXTRIP - Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

    <!-- Header -->
    <header class="auth-header">
        <div class="auth-brand">NEXTRIP</div>
        <p class="auth-tagline">Your Ultimate Travel Companion</p>
    </header>

    <main class="auth-main">
        <div class="container">
            <div class="row justify-content-center align-items-center min-vh-80">
                <div class="col-12 col-md-7 col-lg-5">

                    <div class="auth-card">
                        <div class="auth-card-header">
                            <h2>Welcome Back</h2>
                            <p>Sign in to continue your journey</p>
                        </div>

                        <form id="signinForm" novalidate>

                            <!-- Email -->
                            <div class="form-group mb-3">
                                <label for="signinEmail" class="form-label auth-label">Email Address</label>
                                <input type="email" class="form-control auth-input" id="signinEmail" name="email" placeholder="example@mail.com">
                                <span class="error-msg" id="signinEmailError"></span>
                            </div>

                            <!-- Password -->
                            <div class="form-group mb-4">
                                <label for="signinPassword" class="form-label auth-label">Password</label>
                                <div class="password-wrapper">
                                    <input type="password" class="form-control auth-input" id="signinPassword" name="password" placeholder="Enter your password">
                                    <button type="button" class="toggle-password" data-target="signinPassword" aria-label="Toggle password">
                                        <span class="eye-icon" id="signinPasswordEye">👁️</span>
                                    </button>
                                </div>
                                <span class="error-msg" id="signinPasswordError"></span>
                            </div>

                            <button type="submit" class="btn auth-btn w-100">Sign In</button>
                            <span class="error-msg d-block text-center mt-2" id="signinError"></span>
                            <span class="success-msg" id="signinSuccess"></span>

                        </form>

                        <div class="auth-redirect">
                            Don't have an account? <a href="SignUp.html" class="auth-link">Sign Up</a>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <footer class="auth-footer">
        <p>&copy; 2024 NEXTRIP. All Rights Reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="index.js"></script>
</body>
</html>
